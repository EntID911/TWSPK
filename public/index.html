<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TWSPK</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;

      height: calc(var(--vh, 1vh) * 100);
      min-height: 100vh;

      overflow: hidden;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1b1d22;
      flex-shrink: 0;
      background: #0f0f0f;
    }

    .header-shell {
      display: grid;
      grid-template-columns: minmax(240px, 320px) minmax(0, 1fr) minmax(210px, 260px);
      gap: 14px;
      align-items: center;
    }
    .header-spacer { display: none; }
    .github-hub,
    .source-trigger {
      min-height: 66px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #121212;
      box-shadow: none;
      color: #f4f4f4;
      text-decoration: none;
      transition: border-color 0.18s ease, background 0.18s ease;
    }
    .github-hub:hover,
    .source-trigger:hover {
      border-color: #3a3a3a;
      background: #151515;
    }
    .github-hub {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      min-width: 0;
    }
    .github-icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      display: block;
    }
    .github-copy,
    .source-copy {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .github-kicker,
    .source-trigger-support {
      color: #8f8f8f;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
      white-space: nowrap;
    }
    .github-name,
    .source-brand-name {
      color: #f1f1f1;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.2;
      white-space: normal;
      word-break: break-word;
    }
    .github-name {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header-center {
      min-width: 0;
    }
    .search-panel {
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 66px;
      padding: 10px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: #121212;
      box-shadow: none;
    }
    .header-search {
      flex: 1 1 320px;
      min-width: 260px;
    }
    .header-search .search-box {
      width: 100%;
      min-width: 0;
    }
    .header-search input {
      width: 100%;
      min-width: 0;
      height: 44px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid #2d2d2d;
      background: #0f0f0f;
      color: #e8e8e8;
      font-size: 14px;
      box-shadow: none;
    }
    .header-search input::placeholder {
      color: #7c7c7c;
    }
    .header-search input:focus {
      border-color: #4b4b4b;
      outline: none;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
      padding-left: 12px;
      border-left: 1px solid #232323;
      flex-shrink: 0;
    }
    .header-btn {
      min-width: 84px;
      height: 42px;
      padding: 0 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #cfcfcf;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .header-btn:hover {
      background: #202020;
      border-color: #444;
      color: #f1f1f1;
    }
    .header-btn.primary {
      background: #1a1a1a;
      border-color: #333;
      color: #f1f1f1;
    }
    .header-btn.primary:hover {
      background: #202020;
      border-color: #444;
    }
    .export-menu {
      position: relative;
      display: inline-flex;
    }
    .export-options {
      position: absolute;
      top: calc(100% + 6px);
      right: 0;
      min-width: 128px;
      padding: 6px;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      background: #111;
      box-shadow: 0 14px 28px rgba(0,0,0,0.36);
      display: none;
      z-index: 50;
    }
    .export-menu.open .export-options,
    .export-menu:focus-within .export-options {
      display: grid;
      gap: 4px;
    }
    .export-option {
      width: 100%;
      text-align: left;
      border-radius: 7px;
      background: transparent;
      color: #d8d8d8;
    }
    .export-option:hover {
      background: #202020;
      color: #fff;
    }
    .source-hub {
      position: relative;
      justify-self: end;
    }
    .source-trigger {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .source-mark {
      width: auto;
      height: 34px;
      max-width: 96px;
      flex-shrink: 0;
      display: block;
      object-fit: contain;
      object-position: left center;
    }
    .source-flyout {
      position: absolute;
      top: 0;
      right: 0;
      width: min(336px, calc(100vw - 28px));
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #2a2a2a;
      background: rgba(17,17,17,0.98);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
      backdrop-filter: none;
      opacity: 0;
      transform: translateX(24px) translateY(2px) scale(0.98);
      transform-origin: right top;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 60;
    }
    .source-hub:hover .source-flyout,
    .source-hub:focus-within .source-flyout {
      opacity: 1;
      transform: translateX(0) translateY(0) scale(1);
      pointer-events: auto;
    }
    .source-flyout-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .source-flyout-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .source-support {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: #8f8f8f;
    }
    .source-flyout-brand {
      font-size: 15px;
      font-weight: 700;
      color: #f1f1f1;
      line-height: 1.2;
    }
    .source-platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .source-platform {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #171717;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }
    .source-platform:hover {
      transform: none;
      border-color: #444;
      background: #202020;
    }
    .source-platform img {
      width: 21px;
      height: 21px;
      display: block;
    }
    .source-note {
      font-size: 12px;
      line-height: 1.58;
      color: #8f8f8f;
    }

    .toolbar {
      display: none;
    }
    .toolbar-group {
      display: none;
    }
    .toolbar input {
      flex: 1; min-width: 220px; padding: 6px 11px;
      background: #1a1a1a; border: 1px solid #333; border-radius: 6px;
      color: #e0e0e0; font-size: 13px; outline: none;
    }
    .toolbar input:focus { border-color: #555; }
    .search-box { position: relative; flex: 1; min-width: 260px; }
    .search-results {
      display: none;
      position: absolute;
      left: 0;
      right: 0;
      top: calc(100% + 6px);
      z-index: 40;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      box-shadow: 0 14px 28px rgba(0,0,0,0.36);
      overflow: hidden;
      max-height: min(360px, 48vh);
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #343434 transparent;
    }
    .search-results::-webkit-scrollbar { width: 6px; height: 6px; }
    .search-results::-webkit-scrollbar-track { background: transparent; }
    .search-results::-webkit-scrollbar-thumb {
      background: #343434;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .search-results::-webkit-scrollbar-thumb:hover { background: #4a4a4a; background-clip: content-box; }
    .search-results.visible { display: block; }
    .search-result,
    .search-result-empty {
      padding: 10px 12px;
      font-size: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .search-result:last-child,
    .search-result-empty:last-child { border-bottom: none; }
    .search-result {
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .search-result:hover { background: #161616; }
    .search-result.added { opacity: 0.45; }
    .search-result-title { color: #f5f5f5; }
    .search-result-meta { color: #8f8f8f; font-size: 11px; }
    .search-result-empty { color: #8f8f8f; }

    button {
      padding: 6px 13px; border-radius: 6px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .btn-add { background: #2563eb; color: #fff; }
    .btn-add:hover { background: #1d4ed8; }
    .btn-sm { background: #252525; color: #c0c0c0; }
    .btn-sm:hover { background: #333; color: #f0f0f0; }

    .type-tabs {
      display: flex;
      gap: 6px;
      padding: 7px 20px;
      flex-wrap: wrap;
      border-bottom: 1px solid #222;
      flex-shrink: 0;
      align-items: center;
    }
    .type-tab {
      padding: 3px 11px; border-radius: 20px; font-size: 12px;
      cursor: pointer; border: 1px solid #333; background: transparent; color: #8a8a8a;
    }
    .type-tab.active { background: #2563eb; border-color: #2563eb; color: #fff; }

    .noise-range {
      display: none; align-items: center; gap: 5px;
      margin-left: auto; font-size: 12px; color: #9a9a9a;
    }
    .noise-range.visible { display: flex; }
    .noise-range input {
      width: 62px; padding: 3px 6px; background: #1a1a1a;
      border: 1px solid #333; border-radius: 4px; color: #e0e0e0;
      font-size: 12px; outline: none; text-align: center;
    }

    .products {
      display: flex; gap: 6px; padding: 6px 20px; flex-wrap: wrap;
      border-bottom: 1px solid #222; flex-shrink: 0; min-height: 34px; align-items: center;
    }
    .product-tag {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 34px 8px 12px;
      border-radius: 14px;
      font-size: 12px;
      border: 1px solid;
      background: rgba(255,255,255,0.025);
      max-width: 100%;
      position: relative;
    }
    .product-tag .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .product-tag-body {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .product-tag .title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: min(560px, 72vw);
      color: #f5f5f5;
      font-weight: 600;
    }
    .tag-stats-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
      flex-wrap: nowrap;
      max-width: min(620px, 84vw);
      width: 100%;
    }
    .tag-stats-label {
      display: none;
    }
    .tag-stats-primary {
      min-width: 158px;
      padding: 7px 11px;
      border-radius: 10px;
      border: 1px solid #303030;
      background: #171717;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      flex-shrink: 0;
    }
    .tag-stats-primary.is-passive {
      border-color: #383838;
      background: #171717;
    }
    .tag-stats-primary-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }
    .tag-stats-primary-title {
      color: #e6e6e6;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1.2;
      max-width: calc(100% - 22px);
      white-space: normal;
    }
    .tag-stats-primary-hint {
      color: #8f8f8f;
      font-size: 9px;
      letter-spacing: 0;
      line-height: 1;
      writing-mode: vertical-rl;
      text-orientation: upright;
      flex-shrink: 0;
    }
    .tag-stats-primary.is-passive .tag-stats-primary-hint {
      color: #8f8f8f;
    }
    .tag-stats-primary-value {
      color: #f2f2f2;
      font-size: 15px;
      font-weight: 700;
      line-height: 1;
    }
    .tag-stats-boxes {
      display: grid;
      grid-template-columns: repeat(2, minmax(92px, max-content));
      gap: 6px;
      min-width: 0;
    }
    .stat-chip {
      display: inline-flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      padding: 5px 9px;
      border-radius: 10px;
      border: 1px solid #303030;
      background: #171717;
      box-shadow: none;
    }
    .stat-chip.is-passive {
      border-color: #383838;
      background: #171717;
    }
    .stat-chip-label {
      color: #8f8f8f;
      font-size: 10px;
      letter-spacing: 0.03em;
    }
    .stat-chip-value {
      color: #f2f2f4;
      font-size: 11px;
      font-weight: 600;
    }
    .product-tag .remove {
      cursor: pointer;
      opacity: 0.55;
      font-size: 14px;
      line-height: 1;
      position: absolute;
      right: 10px;
      top: 8px;
    }
    .product-tag .remove:hover { opacity: 1; }

    .status { padding: 3px 20px; font-size: 12px; color: #9a9a9a; flex-shrink: 0; min-height: 20px; }
    .status.error { color: #f87171; }
    .status.loading { color: #60a5fa; }

    .chart-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
    #chart { flex: 1; min-height: 0; }

    .legend-wrap {
      flex-shrink: 0;
      max-height: 118px;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 20px;
      border-top: 1px solid #1a1a1a;
      background: #0b0b0b;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--legend-col-width, 240px), var(--legend-col-width, 240px)));
      justify-content: start;
      gap: 4px 8px;
      align-items: start;

      scrollbar-width: thin;
      scrollbar-color: #343434 transparent;
    }
    .legend-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
    .legend-wrap::-webkit-scrollbar-track { background: transparent; }
    .legend-wrap::-webkit-scrollbar-thumb {
      background: #343434;
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }
    .legend-wrap::-webkit-scrollbar-thumb:hover { background: #4a4a4a; background-clip: content-box; }
    .legend-actions {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 6px;
      align-items: center;
      margin-right: 0;
    }
    .legend-actions .btn-sm {
      display: flex;
      align-items: center;
      width: 100%;
      justify-content: center;
    }
    .legend-actions .btn-sm.active {
      background: #1d4ed8;
      color: #fff;
    }

    .legend-item {
      display: flex; align-items: flex-start; gap: 6px;
      min-width: 0;
      min-height: 24px;
      font-size: 11px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px; user-select: none; color: #d0d0d0;
      max-width: 100%;
      box-sizing: border-box;
    }
    .legend-item:hover { background: #151515; }
    .legend-item.hidden { opacity: 0.35; }
    .legend-line { width: 18px; height: 0; flex-shrink: 0; margin-top: 7px; }
    .legend-name {
      overflow: visible;
      text-overflow: clip;
      white-space: nowrap;
      overflow-wrap: anywhere;
      line-height: 1.35;
      max-width: 100%;
      min-width: 0;
    }

    @media (max-width: 860px) {
      header,
      .toolbar,
      .type-tabs,
      .products,
      .status,
      .legend-wrap { padding-left: 14px; padding-right: 14px; }

      .header-shell {
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .header-center,
      .header-search,
      .github-hub,
      .source-hub,
      .source-trigger,
      .search-panel {
        width: 100%;
        min-width: 0;
      }
      .search-panel {
        flex-wrap: wrap;
        align-items: stretch;
      }
      .header-search {
        min-width: 0;
        width: 100%;
        flex-basis: auto;
      }
      .header-actions {
        width: 100%;
        padding-left: 0;
        padding-top: 10px;
        border-left: none;
        border-top: 1px solid #22262d;
      }
      .header-btn {
        flex: 1;
      }
      .source-hub {
        justify-self: stretch;
      }
      .source-flyout {
        right: 0;
        width: min(100%, 356px);
      }
      .product-tag { width: 100%; }
      .product-tag .title,
      .tag-stats-row { max-width: calc(100vw - 92px); }
      .tag-stats-row {
        flex-wrap: wrap;
      }
      .legend-wrap {
        grid-template-columns: 1fr;
      }
      .tag-stats-primary {
        width: 100%;
      }
      .tag-stats-boxes {
        width: 100%;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .search-results {
        max-height: min(300px, 42vh);
      }
    }
  </style>
</head>

<body>
<header>
  <div class="header-shell">
    <a class="github-hub" href="https://github.com/EntID911/TWSPK" target="_blank" rel="noreferrer noopener" aria-label="EntID911/TWSPK">
      <img class="github-icon" src="/assets/icon-github.svg" alt="GitHub" />
      <span class="github-copy">
        <span class="github-kicker">GitHub</span>
        <span class="github-name" data-i18n="githubName">EntID911/TWSPK 支持数据重渲染</span>
      </span>
    </a>

    <div class="header-center">
      <div class="search-panel">
        <div class="header-search">
          <div class="search-box">
            <input id="productInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="搜索耳机型号/粘贴ReaLab链接（支持模糊搜索,如AirPods Pro 2/APP2）" autocomplete="off" />
            <div class="search-results" id="searchResults"></div>
          </div>
        </div>
        <div class="header-actions">
          <button class="btn-sm header-btn" id="btnClear" data-i18n="clearChart">清空图表</button>
          <div class="export-menu" id="exportMenu">
            <button class="btn-sm header-btn" id="btnExportMenu" type="button" data-i18n="exportImage">导出图片</button>
            <div class="export-options" id="exportOptions">
              <button class="export-option" type="button" data-export-format="png">PNG</button>
              <button class="export-option" type="button" data-export-format="jpg">JPG</button>
              <button class="export-option" type="button" data-export-format="svg">SVG</button>
              <button class="export-option" type="button" data-export-format="webp">WEBP</button>
            </div>
          </div>
          <button class="btn-sm header-btn" id="btnLang" type="button">English</button>
        </div>
      </div>
    </div>

    <div class="source-hub">
      <a class="source-trigger" href="https://www.realab.com/" target="_blank" rel="noreferrer noopener" aria-label="ReaLab阅真实验室">
        <img class="source-mark" src="/assets/realab-mark.png" alt="ReaLab阅真实验室" />
        <span class="source-copy">
          <span class="source-brand-name">ReaLab阅真实验室</span>
        </span>
      </a>

      <div class="source-flyout">
        <div class="source-flyout-header">
          <img class="source-mark" src="/assets/realab-mark.png" alt="ReaLab阅真实验室" />
          <div class="source-flyout-copy">
            <div class="source-support" data-i18n="sourceSupport">提供数据支持</div>
            <div class="source-flyout-brand">ReaLab阅真实验室</div>
          </div>
        </div>

        <div class="source-platforms">
          <a class="source-platform" href="https://search.bilibili.com/all?keyword=ReaLab%E9%98%85%E7%9C%9F%E5%AE%9E%E9%AA%8C%E5%AE%A4" target="_blank" rel="noreferrer noopener" title="Bilibili">
            <img src="/assets/icon-bilibili.svg" alt="Bilibili" />
          </a>
          <a class="source-platform" href="https://s.weibo.com/weibo?q=ReaLab%E9%98%85%E7%9C%9F%E5%AE%9E%E9%AA%8C%E5%AE%A4" target="_blank" rel="noreferrer noopener" title="微博">
            <img src="/assets/icon-weibo.svg" alt="微博" />
          </a>

/* ---- color helpers (darken) ---- */
function hexToRgb(hex) {
  const h = String(hex || '').replace('#','').trim()
  if (h.length === 3) {
    const r = parseInt(h[0] + h[0], 16)
    const g = parseInt(h[1] + h[1], 16)
    const b = parseInt(h[2] + h[2], 16)
    return { r, g, b }
  }
  if (h.length === 6) {
    const r = parseInt(h.slice(0,2), 16)
    const g = parseInt(h.slice(2,4), 16)
    const b = parseInt(h.slice(4,6), 16)
    return { r, g, b }
  }
  return { r: 255, g: 255, b: 255 }
}
function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255
  const max = Math.max(r,g,b), min = Math.min(r,g,b)
  let h = 0, s = 0
  const l = (max + min) / 2
  if (max !== min) {
    const d = max - min
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min)
    switch (max) {
      case r: h = (g - b) / d + (g < b ? 6 : 0); break
      case g: h = (b - r) / d + 2; break
      case b: h = (r - g) / d + 4; break
    }
    h /= 6
  }
  return { h, s, l }
}
function hslToCss(h, s, l) {
  return `hsl(${Math.round(h*360)} ${Math.round(s*100)}% ${Math.round(l*100)}%)`
}
function adjustSatLight(hex, satFactor, lightDelta) {
  const { r, g, b } = hexToRgb(hex)
  const { h, s, l } = rgbToHsl(r, g, b)
  const ns = Math.max(0, Math.min(1, s * satFactor))
  const nl = Math.max(0, Math.min(1, l + lightDelta))
  return hslToCss(h, ns, nl)
}

/* ---- interpolate/shift for target alignment ---- */
function interpolateY(points, hz) {
  if (!points || points.length < 2) return null
  let prev = null
  for (let i = 0; i < points.length; i++) {
    const p = points[i]
    if (p[0] === hz) return p[1]
    if (p[0] > hz) {
      const next = p
      if (!prev) return next[1]
      const x1 = prev[0], y1 = prev[1]
      const x2 = next[0], y2 = next[1]
      const t = (hz - x1) / (x2 - x1)
      return y1 + (y2 - y1) * t
    }
    prev = p
  }
  return points[points.length - 1][1]
}
function shiftY(points, offset) {
  return (points || []).map(p => [p[0], p[1] + offset])
}

function normalizeProductUrl(value) {

function interpolateCurveY(points, hz) {
  if (!points || points.length < 2 || !hz) return null
  const logHz = Math.log10(hz)

  for (let i = 1; i < points.length; i++) {
    const prev = points[i - 1]
    const next = points[i]

    if (hz === prev[0]) return prev[1]
    if (hz === next[0]) return next[1]
    if (hz > next[0]) continue

    const x1 = Math.log10(prev[0])
    const x2 = Math.log10(next[0])
    if (!isFinite(x1) || !isFinite(x2) || x1 === x2) return next[1]

    const ratio = (logHz - x1) / (x2 - x1)
    return prev[1] + (next[1] - prev[1]) * ratio
  }

  return points[points.length - 1][1]
}

function buildOctaveBands(fromHz, toHz, octaveWidth) {
  const bands = []
  const width = octaveWidth || 1
  const edgeRatio = Math.pow(2, width / 2)

  for (let index = -10000; index <= 10000; index++) {
    const center = 1000 * Math.pow(2, index * width)
    const lower = center / edgeRatio
    const upper = center * edgeRatio

    if (upper < fromHz) continue
    if (lower > toHz) break

    bands.push({
      from: Math.max(fromHz, lower),
      to: Math.min(toHz, upper)
    })
  }

  return bands
}

function computeNoiseBandAverage(points, fromHz, toHz, octaveWidth = 1 / 3) {
  if (!points || points.length < 2) return null

  const octaveBands = buildOctaveBands(fromHz, toHz, octaveWidth)
  const bandAverages = []

  octaveBands.forEach((band, index) => {
    let sum = 0
    let count = 0

    points.forEach(point => {
      const hz = point[0]
      const y = point[1]
      if (hz < band.from) return
      if (index === octaveBands.length - 1 ? hz > band.to : hz >= band.to) return
      if (typeof y !== 'number' || Number.isNaN(y)) return
      sum += Math.max(0, -y)
      count += 1
    })

    if (count) bandAverages.push(sum / count)
  })

  return bandAverages.length
    ? bandAverages.reduce((sum, value) => sum + value, 0) / bandAverages.length
    : null
}

function computeNoiseCurveStats(points) {
  if (!points || points.length < 2) return null

  const stats = {}
  NOISE_STATS_BANDS.forEach(band => {
    stats[band.key] = computeNoiseBandAverage(points, band.from, band.to, band.octaveWidth)
  })

  stats.peak = points.reduce((best, point) => Math.max(best, Math.max(0, -point[1])), 0)
  return stats
}

function buildNoiseStatsMap(product) {
  const groups = {}

  ;((product && product.data) || [])
    .filter(curve => curve && curve.type && curve.type.id === NOISE_TYPE_ID)
    .forEach(curve => {
      const group = getNoiseGroupFromTitle(curve.title || '')
      if (group === 'other') return

      const points = parsePointsFromRows(curve.data || [], 20000, 1, false)
        .sort((a, b) => a[0] - b[0])

      if (points.length < 2) return
      if (!groups[group] || points.length > groups[group].points.length) {
        groups[group] = { title: curve.title || '', points }
      }
    })

  return Object.fromEntries(
    Object.entries(groups).map(([group, entry]) => [group, computeNoiseCurveStats(entry.points)])
  )
}

function buildNoiseMetricEntries(stats, includePeak) {

  if (includePeak) {

}

}

function splitSummaryMetrics(row) {
  const metrics = row && Array.isArray(row.metrics) ? row.metrics : []
  if (!metrics.length) {
    return {

      secondaryMetrics: []

  }

  const primaryMetric = metrics.find(metric => metric.key === 'full') || metrics[0]
  return {

    secondaryMetrics: metrics.filter(metric => metric !== primaryMetric)
  }
}

}

function wrapCanvasText(ctx, text, maxWidth) {
  const value = String(text || '').trim()
  if (!value) return []

  const lines = []
  let line = ''

  for (const ch of value) {
    if (!line && ch === ' ') continue
    const next = line + ch
    if (line && ctx.measureText(next).width > maxWidth) {
      lines.push(line.trim())
      line = ch
    } else {
      line = next
    }
  }

  if (line.trim()) lines.push(line.trim())
  return lines
}

function fitCanvasText(ctx, text, maxWidth) {
  const source = String(text || '')
  if (ctx.measureText(source).width <= maxWidth) return source

  const suffix = '...'
  let left = 0
  let right = source.length

  while (left < right) {
    const mid = Math.ceil((left + right) / 2)
    if (ctx.measureText(source.slice(0, mid) + suffix).width <= maxWidth) left = mid
    else right = mid - 1
  }

  return source.slice(0, left).trimEnd() + suffix
}

function layoutLegendRows(ctx, items, maxWidth) {
  const rows = []
  if (!items || !items.length) return rows

  const columnGap = 12
  const longestText = items.reduce((max, item) => Math.max(max, ctx.measureText(item.name || '').width), 0)
  const targetColumnWidth = Math.min(maxWidth, Math.max(140, Math.ceil(longestText + 54)))
  const columnCount = Math.max(1, Math.min(items.length, Math.floor((maxWidth + columnGap) / (targetColumnWidth + columnGap)) || 1))
  const columnWidth = Math.min(targetColumnWidth, Math.floor((maxWidth - columnGap * (columnCount - 1)) / columnCount))

  for (let index = 0; index < items.length; index += columnCount) {
    const row = []
    for (let column = 0; column < columnCount; column++) {
      const item = items[index + column]
      if (!item) continue
      const textMaxWidth = Math.max(120, columnWidth - 42)
      const lines = wrapCanvasText(ctx, item.name || '', textMaxWidth)
      row.push({
        series: item,
        width: columnWidth + (column === columnCount - 1 ? 0 : columnGap),
        textMaxWidth,
        lines: lines.length ? lines : ['']
      })
    }
    row.rowHeight = Math.max(30, row.reduce((max, item) => Math.max(max, item.lines.length * 18 + 8), 0))
    rows.push(row)
  }

  return rows
}

function buildExportInfoRowsForProduct(ctx, product, maxWidth) {
  const rows = []

  ctx.font = '600 18px system-ui, sans-serif'
  const titleLines = wrapCanvasText(ctx, product.title || '(unknown)', maxWidth - 18)
  rows.push({
    kind: 'product',
    color: product.color,
    lines: titleLines.length ? titleLines : ['(unknown)']
  })

  getProductSummaryRows(product).forEach(summary => {
    const metricText = (summary.metrics || [])
      .map(metric => metric.label + ' ' + metric.value)
      .join(' / ')

    ctx.font = '13px system-ui, sans-serif'
    rows.push({
      kind: 'summary',
      label: summary.label,
      lines: wrapCanvasText(ctx, summary.label + ': ' + metricText, maxWidth)
    })
  })

  return rows
}

function buildExportInfoRows(ctx, maxWidth) {
  return products.flatMap(product => buildExportInfoRowsForProduct(ctx, product, maxWidth))
}

function measureExportInfoRowsHeight(rows) {
  let height = 0

  rows.forEach(row => {
    if (row.kind === 'product') height += row.lines.length * 24 + 4
    else height += row.lines.length * 18 + 6
  })

  return height
}

function drawExportInfoRows(ctx, x, y, rows) {
  let cursorY = y

  rows.forEach(row => {
    if (row.kind === 'product') {
      ctx.fillStyle = row.color || '#d8d8d8'
      ctx.fillRect(x, cursorY + 7, 8, 8)
      ctx.fillStyle = '#eeeeee'
      ctx.font = '600 18px system-ui, sans-serif'
      row.lines.forEach((line, index) => {
        ctx.fillText(line, x + 18, cursorY + 18 + index * 24)
      })
      cursorY += row.lines.length * 24 + 4
      return
    }

    ctx.fillStyle = '#a8abb3'
    ctx.font = '13px system-ui, sans-serif'
    row.lines.forEach((line, index) => {
      ctx.fillText(line, x, cursorY + 14 + index * 18)
    })
    cursorY += row.lines.length * 18 + 6
  })

  return cursorY - y
}

function buildExportInfoColumns(ctx, maxWidth) {
  const columnGap = products.length > 1 ? 28 : 0
  const minColumnWidth = 240
  const columnCount = products.length > 1
    ? Math.max(2, Math.min(products.length, 4, Math.floor((maxWidth + columnGap) / (minColumnWidth + columnGap)) || 2))
    : 1
  const columnWidth = Math.floor((maxWidth - columnGap * (columnCount - 1)) / columnCount)
  const columns = Array.from({ length: columnCount }, () => ({ blocks: [], height: 0 }))

  products.forEach((product, index) => {
    const rows = buildExportInfoRowsForProduct(ctx, product, columnWidth)
    const height = measureExportInfoRowsHeight(rows)
    const column = columns[index % columnCount]
    if (column.blocks.length) column.height += 14
    column.blocks.push({ rows, height })
    column.height += height
  })

  return {
    columns,
    columnGap,
    columnWidth,
    height: columns.reduce((max, column) => Math.max(max, column.height), 0)
  }
}

function drawExportInfoColumns(ctx, x, y, layout) {
  layout.columns.forEach((column, index) => {
    let cursorY = y
    const columnX = x + index * (layout.columnWidth + layout.columnGap)

    column.blocks.forEach((block, blockIndex) => {
      if (blockIndex) cursorY += 14
      drawExportInfoRows(ctx, columnX, cursorY, block.rows)
      cursorY += block.height
    })
  })
}

function measureExportStatChip(ctx, metric) {
  const labelText = String(metric && metric.label ? metric.label : '')
  const valueText = String(metric && metric.value ? metric.value : '')

  ctx.save()
  ctx.font = '10px system-ui, sans-serif'
  const labelWidth = ctx.measureText(labelText).width
  ctx.font = '600 11px system-ui, sans-serif'
  const valueWidth = ctx.measureText(valueText).width
  ctx.restore()

  return Math.max(84, Math.ceil(labelWidth + valueWidth + 24))
}

function measureExportPrimaryStatChip(ctx, row, metric) {
  const titleText = String(row && row.label ? row.label : '')
  const valueText = String(metric && metric.value ? metric.value : '')

  ctx.save()
  ctx.font = '700 11px system-ui, sans-serif'
  const titleWidth = ctx.measureText(titleText).width
  ctx.font = '700 14px system-ui, sans-serif'
  const valueWidth = ctx.measureText(valueText).width
  ctx.restore()

  return Math.max(164, Math.ceil(Math.max(titleWidth + 36, valueWidth + 26)))
}

function layoutExportStatsRow(ctx, row, maxWidth) {
  const { primaryMetric, secondaryMetrics } = splitSummaryMetrics(row)
  const chipGap = 8
  const gridGap = 6
  const chipHeight = 26
  const primaryHeight = 40
  const clusterRows = []

  for (let i = 0; i < secondaryMetrics.length; i += 2) {
    clusterRows.push(secondaryMetrics.slice(i, i + 2).map(metric => ({
      metric,
      width: measureExportStatChip(ctx, metric)
    })))
  }

  const clusterWidth = clusterRows.length
    ? Math.max(...clusterRows.map(items => items.reduce((sum, item, index) => {
        return sum + item.width + (index ? gridGap : 0)
      }, 0)))
    : 0
  const clusterHeight = clusterRows.length
    ? clusterRows.length * chipHeight + (clusterRows.length - 1) * gridGap
    : 0
  const primaryWidth = primaryMetric ? measureExportPrimaryStatChip(ctx, row, primaryMetric) : 0
  const stacked = primaryWidth && clusterWidth && (primaryWidth + chipGap + clusterWidth > maxWidth)
  const rowHeight = stacked
    ? (primaryHeight + (clusterHeight ? 8 + clusterHeight : 0))
    : Math.max(primaryHeight, clusterHeight || 0)

  return {
    primaryMetric,
    primaryWidth,
    clusterRows,
    clusterWidth,
    clusterHeight,
    chipGap,
    gridGap,
    chipHeight,
    primaryHeight,
    stacked,
    rowHeight
  }
}

function measureExportStatsRowHeight(ctx, row, maxWidth) {
  return layoutExportStatsRow(ctx, row, maxWidth).rowHeight
}

function drawExportStatChip(ctx, x, y, width, metric, options = {}) {
  ctx.save()
  drawRoundRect(ctx, x, y, width, 26, 10)
  ctx.fillStyle = options.fill || '#171717'
  ctx.fill()
  ctx.lineWidth = 1
  ctx.strokeStyle = options.stroke || '#343434'
  ctx.stroke()

  ctx.textBaseline = 'middle'
  ctx.font = '10px system-ui, sans-serif'
  ctx.fillStyle = '#9fa1a8'
  const labelText = String(metric && metric.label ? metric.label : '')
  const valueText = String(metric && metric.value ? metric.value : '')
  const labelX = x + 8
  ctx.fillText(labelText, labelX, y + 13.5)

  const labelWidth = ctx.measureText(labelText).width
  ctx.font = '600 11px system-ui, sans-serif'
  ctx.fillStyle = '#f2f2f4'
  ctx.fillText(valueText, labelX + labelWidth + 6, y + 13.5)
  ctx.restore()
}

function drawCanvasVerticalText(ctx, text, x, y, lineHeight = 10) {
  const value = String(text || '')
  Array.from(value).forEach((char, index) => {
    ctx.fillText(char, x, y + index * lineHeight)
  })
}

function drawExportPrimaryStatChip(ctx, x, y, width, row, metric, options = {}) {
  ctx.save()
  drawRoundRect(ctx, x, y, width, 40, 12)
  ctx.fillStyle = options.fill || '#171717'
  ctx.fill()
  ctx.lineWidth = 1
  ctx.strokeStyle = options.stroke || '#303030'
  ctx.stroke()

  ctx.textBaseline = 'alphabetic'
  ctx.fillStyle = '#eef1f7'
  ctx.font = '700 11px system-ui, sans-serif'
  ctx.fillText(row.label || '', x + 10, y + 14)

  ctx.fillStyle = options.hintColor || '#8f8f8f'
  ctx.font = '9px system-ui, sans-serif'
  ctx.textAlign = 'center'
  drawCanvasVerticalText(ctx, metric && metric.label ? metric.label : '', x + width - 12, y + 10, 9)

  ctx.textAlign = 'left'
  ctx.fillStyle = '#ffffff'
  ctx.font = '700 14px system-ui, sans-serif'
  ctx.fillText(metric && metric.value ? metric.value : '--', x + 10, y + 31)
  ctx.restore()
}

function drawExportStatsRow(ctx, x, y, row, maxWidth) {
  const layout = layoutExportStatsRow(ctx, row, maxWidth)

  const secondaryX = layout.stacked ? x : x + layout.primaryWidth + (layout.clusterRows.length ? layout.chipGap : 0)
  const secondaryYBase = layout.stacked ? y + layout.primaryHeight + 8 : y + Math.max(0, (layout.rowHeight - layout.clusterHeight) / 2)

  if (layout.primaryMetric) {
    drawExportPrimaryStatChip(ctx, x, y, layout.primaryWidth, row, layout.primaryMetric, {
      fill: '#171717',
      stroke: row.chipClassName ? '#383838' : '#303030',
      hintColor: '#8f8f8f'
    })
  }

  layout.clusterRows.forEach((items, rowIndex) => {
    let chipX = secondaryX
    const chipY = secondaryYBase + rowIndex * (layout.chipHeight + layout.gridGap)

    items.forEach((item, index) => {
      if (index) chipX += layout.gridGap
      drawExportStatChip(ctx, chipX, chipY, item.width, item.metric, {
        fill: row.chipClassName ? '#1a1a1a' : '#171717',
        stroke: row.chipClassName ? '#424242' : '#343434'
      })
      chipX += item.width
    })
  })

  return layout.rowHeight
}

function drawRoundRect(ctx, x, y, width, height, radius) {
  const r = Math.max(0, Math.min(radius || 0, width / 2, height / 2))
  ctx.beginPath()
  ctx.moveTo(x + r, y)
  ctx.arcTo(x + width, y, x + width, y + height, r)
  ctx.arcTo(x + width, y + height, x, y + height, r)
  ctx.arcTo(x, y + height, x, y, r)
  ctx.arcTo(x, y, x + width, y, r)
  ctx.closePath()
}

function drawExportBadge(ctx, x, y, text, options = {}) {
  const padX = options.padX || 9
  const width = Math.max(
    options.minWidth || 28,
    options.iconImage ? (options.iconWidth || 36) : (ctx.measureText(text).width + padX * 2)
  )
  const height = options.height || 28

  ctx.save()
  drawRoundRect(ctx, x, y, width, height, options.radius || 14)
  ctx.fillStyle = options.fill || '#1a1a1a'
  ctx.fill()
  ctx.lineWidth = 1
  ctx.strokeStyle = options.stroke || '#343434'
  ctx.stroke()
  if (options.iconImage) {
    const iconSize = options.iconSize || 18
    ctx.drawImage(
      options.iconImage,
      x + (width - iconSize) / 2,
      y + (height - iconSize) / 2,
      iconSize,
      iconSize
    )
  } else {
    ctx.fillStyle = options.color || '#f3f3f3'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.font = options.font || '700 14px system-ui, sans-serif'
    ctx.fillText(text, x + width / 2, y + height / 2 + 0.5)
  }
  ctx.restore()

  return width
}

function loadImage(url) {
  return new Promise((resolve, reject) => {
    const img = new Image()
    img.onload = () => resolve(img)
    img.onerror = () => reject(new Error(t('imageBuildFailed')))
    img.src = url
  })
}

function formatExportTime(date) {
  const d = date || new Date()
  const pad = n => String(n).padStart(2, '0')
  return [
    d.getFullYear(),
    pad(d.getMonth() + 1),
    pad(d.getDate())
  ].join('-') + ' ' + [pad(d.getHours()), pad(d.getMinutes())].join(':')
}

function buildExportBaseName() {
  return buildDownloadName(
    'realab_' + (getActiveTypeName() || 'chart') + '_' + formatExportTime().replace(/[ :]/g, '-')
  )
}

function downloadDataUrl(dataUrl, fileName) {
  const link = document.createElement('a')
  link.href = dataUrl
  link.download = fileName
  document.body.appendChild(link)
  link.click()
  link.remove()
}

function downloadBlob(blob, fileName) {
  const url = URL.createObjectURL(blob)
  const link = document.createElement('a')
  link.href = url
  link.download = fileName
  document.body.appendChild(link)
  link.click()
  link.remove()
  setTimeout(() => URL.revokeObjectURL(url), 1000)
}

function scaleExportCanvas(canvas, scale) {
  if (!scale || scale === 1) return canvas

  const scaledCanvas = document.createElement('canvas')
  scaledCanvas.width = Math.round(canvas.width * scale)
  scaledCanvas.height = Math.round(canvas.height * scale)

  const scaledCtx = scaledCanvas.getContext('2d')
  scaledCtx.imageSmoothingEnabled = true
  scaledCtx.imageSmoothingQuality = 'high'
  scaledCtx.drawImage(canvas, 0, 0, scaledCanvas.width, scaledCanvas.height)
  return scaledCanvas
}

async function exportChartImageLegacy() {
  return buildExportCanvas()
}

async function buildExportCanvas() {
  if (!chart || !products.length || !activeType || !lastRenderedSeries.length) {
    throw new Error(t('noExportChart'))
  }

  const chartUrl = chart.getDataURL({
    type: 'png',
    pixelRatio: 2,
    backgroundColor: '#0f0f0f'
  })

  const [img, logoImage, githubIcon] = await Promise.all([
    loadImage(chartUrl),
    loadImage('/assets/realab-mark.png').catch(() => null),
    loadImage('/assets/icon-github.svg').catch(() => null)
  ])

  const width = img.naturalWidth || img.width
  const chartHeight = img.naturalHeight || img.height
  const padding = 40
  const contentWidth = width - padding * 2
  const rightEdge = width - padding
  const visibleItems = getVisibleLegendItems(lastRenderedSeries)
  const exportCanvas = document.createElement('canvas')
  const ctx = exportCanvas.getContext('2d')

  const brandMetrics = measureExportRealabSupport(ctx)
  const titleText = getActiveTypeName() || '图表'
  ctx.font = '700 44px system-ui, sans-serif'
  const measuredTitleWidth = Math.ceil(ctx.measureText(titleText).width) + 16
  const titleRightLimit = contentWidth - brandMetrics.width - 36
  const titleWidth = Math.max(360, Math.min(measuredTitleWidth, Math.max(360, titleRightLimit)))
  const infoGap = 32
  const brandGap = 30
  const preferredInfoX = padding + titleWidth + infoGap
  const preferredInfoRight = rightEdge - brandMetrics.width - brandGap
  let infoX = preferredInfoX
  let infoWidth = preferredInfoRight - preferredInfoX
  let infoTop = padding + 2
  const stackedInfo = infoWidth < (products.length > 1 ? 560 : 280)

  const titleLines = wrapCanvasText(ctx, titleText, titleWidth)

  ctx.font = '16px system-ui, sans-serif'
  const footerLines = wrapCanvasText(ctx, formatExportTime(), titleWidth)
  const titleLineHeight = 54
  const footerLineHeight = 22
  const titleHeight = titleLines.length * titleLineHeight
  const footerHeight = footerLines.length ? 8 + footerLines.length * footerLineHeight : 0
  const titleBlockHeight = titleHeight + footerHeight

  if (stackedInfo) {
    infoX = padding
    infoWidth = contentWidth
    infoTop = padding + Math.max(titleBlockHeight, brandMetrics.height) + 20
  }

  infoWidth = Math.max(240, infoWidth)
  const infoLayout = buildExportInfoColumns(ctx, infoWidth)
  const infoHeight = infoLayout.height
  const headerHeight = stackedInfo
    ? Math.max(titleBlockHeight, brandMetrics.height) + 20 + infoHeight
    : Math.max(titleBlockHeight, infoHeight, brandMetrics.height) + 8

  ctx.font = '16px system-ui, sans-serif'
  const legendRows = layoutLegendRows(ctx, visibleItems, contentWidth)
  const legendHeight = legendRows.length
    ? 24 + legendRows.reduce((sum, row) => sum + (row.rowHeight || 30), 0)
    : 0
  const githubMetrics = measureExportGithubCredit(ctx)
  const githubGap = 16

  exportCanvas.width = width
  exportCanvas.height = padding + headerHeight + chartHeight + legendHeight + githubGap + githubMetrics.height + padding

  ctx.fillStyle = '#0f0f0f'
  ctx.fillRect(0, 0, exportCanvas.width, exportCanvas.height)

  let titleY = padding
  ctx.fillStyle = '#f5f5f5'
  ctx.font = '700 44px system-ui, sans-serif'
  titleLines.forEach(line => {
    ctx.fillText(line, padding, titleY + 43)
    titleY += titleLineHeight
  })

  if (footerLines.length) {
    titleY += 8
    ctx.fillStyle = '#8f8f8f'
    ctx.font = '16px system-ui, sans-serif'
    footerLines.forEach(line => {
      ctx.fillText(line, padding, titleY + 16)
      titleY += footerLineHeight
    })
  }

  drawExportInfoColumns(ctx, infoX, infoTop, infoLayout)
  drawExportRealabSupport(ctx, rightEdge, padding + 2, logoImage)

  let y = padding + headerHeight
  ctx.drawImage(img, 0, y)
  y += chartHeight

  if (legendRows.length) {
    y += 24
    ctx.font = '16px system-ui, sans-serif'

    legendRows.forEach(row => {
      let x = padding
      row.forEach(({ series, width, lines }) => {
        const styleType = (series.lineStyle && series.lineStyle.type) ? series.lineStyle.type : 'solid'
        const color = (series.lineStyle && series.lineStyle.color) ? series.lineStyle.color : '#fff'

        ctx.save()
        ctx.strokeStyle = color
        ctx.lineWidth = 3
        ctx.setLineDash(styleType === 'dashed' ? [10, 6] : [])
        ctx.beginPath()
        ctx.moveTo(x, y + 10)
        ctx.lineTo(x + 26, y + 10)
        ctx.stroke()
        ctx.restore()

        ctx.fillStyle = '#d8d8d8'
        ;(lines && lines.length ? lines : [series.name || '']).forEach((line, index) => {
          ctx.fillText(line, x + 34, y + 15 + index * 18)
        })
        x += width
      })
      y += row.rowHeight || 30
    })
  }

  y += githubGap
  drawExportGithubCredit(ctx, rightEdge, y, githubIcon)

  return {
    canvas: exportCanvas,
    fileBaseName: buildExportBaseName()
  }
}

async function exportRasterImage(format = 'png') {
  const normalizedFormat = format === 'jpg' ? 'jpeg' : String(format || 'png').toLowerCase()
  const mimeType = normalizedFormat === 'jpeg'
    ? 'image/jpeg'
    : normalizedFormat === 'webp'
      ? 'image/webp'
      : 'image/png'
  const extension = normalizedFormat === 'jpeg' ? 'jpg' : normalizedFormat

  setStatusKey('exportingImage', 'loading')

  try {
    const { canvas, fileBaseName } = await buildExportCanvas()
    const outputCanvas = normalizedFormat === 'png' ? scaleExportCanvas(canvas, 1.5) : canvas
    const dataUrl = normalizedFormat === 'png'
      ? outputCanvas.toDataURL(mimeType)
      : outputCanvas.toDataURL(mimeType, 0.95)
    downloadDataUrl(dataUrl, fileBaseName + '.' + extension)
    setStatusKey('imageExported', '')
  } catch (e) {
    setStatus(e.message, 'error')
  }
}

async function exportSvgImage() {
  setStatusKey('exportingSvg', 'loading')

  try {
    const { canvas, fileBaseName } = await buildExportCanvas()
    const pngDataUrl = canvas.toDataURL('image/png')
    const svg = [
      '<?xml version="1.0" encoding="UTF-8"?>',
      '<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"' +
        ' width="' + canvas.width + '" height="' + canvas.height + '"' +
        ' viewBox="0 0 ' + canvas.width + ' ' + canvas.height + '">',
      '<image href="' + pngDataUrl + '" xlink:href="' + pngDataUrl + '"' +
        ' x="0" y="0" width="' + canvas.width + '" height="' + canvas.height + '"/>',
      '</svg>'
    ].join('\n')

    downloadBlob(
      new Blob([svg], { type: 'image/svg+xml;charset=utf-8' }),
      fileBaseName + '.svg'
    )
    setStatusKey('svgExported', '')
  } catch (e) {
    setStatus(e.message, 'error')
  }
}

async function exportChartImage(format = 'png') {
  if (format === 'svg') return exportSvgImage()
  return exportRasterImage(format)
}

/* ---------------- overlay (ZRender) ---------------- */
function ensureOverlayGroup() {
  if (!chart) return null
  const zr = chart.getZr()
  if (!zr) return null
  if (!overlayGroup) {
    overlayGroup = new echarts.graphic.Group({ silent: true })
    overlayGroup.z = 1000
    zr.add(overlayGroup)
  }
  return overlayGroup
}

function getGridRectSafe() {
  try {
    const grid = chart && chart.getModel && chart.getModel().getComponent('grid')
    if (!grid || !grid.coordinateSystem || !grid.coordinateSystem.getRect) return null
    return grid.coordinateSystem.getRect()
  } catch (e) {
    return null
  }
}

function geometricCenter(a, b) {
  if (a <= 0 || b <= 0) return (a + b) / 2
  return Math.sqrt(a * b)
}

/* 关键改动：字号逼近 rect.width，保证首尾贴边 */
function computeWatermarkFontSize(text, rect) {
  const ctx = getMeasureCtx()
  const family = 'system-ui, sans-serif'
  const targetW = rect.width

  let lo = 8
  let hi = 600

  function widthAt(sz) {
    ctx.font = `italic bold ${sz}px ${family}`
    return (ctx.measureText(text).width || 1)
  }

  // 若 hi 还铺不满，就增大 hi（满足“靠不到就增加大小”）
  while (widthAt(hi) < targetW && hi < 2400) hi = Math.floor(hi * 1.35)

  // 二分：找 <= targetW 的最大字号（尽量贴边但不溢出）
  for (let i = 0; i < 20; i++) {
    const mid = (lo + hi) / 2
    const w = widthAt(mid)
    if (w <= targetW) lo = mid
    else hi = mid
  }
  return lo
}

function requestOverlayUpdate() {
  if (!overlayCtx || !chart) return
  if (overlayRAF) return
  overlayRAF = requestAnimationFrame(() => {
    overlayRAF = 0
    updateOverlayNow()
  })
}

function updateOverlayPointerValue(event) {
  if (!overlayCtx) return

  const axesInfo = event && Array.isArray(event.axesInfo) ? event.axesInfo : []
  const yAxisInfo = axesInfo.find(info =>
    info &&
    info.axisDim === 'y' &&
    info.axisIndex === 0 &&
    typeof info.value === 'number' &&
    isFinite(info.value)
  )

  const nextValue = yAxisInfo ? yAxisInfo.value : null
  if (overlayCtx.pointerValue === nextValue) return
  overlayCtx.pointerValue = nextValue
  requestOverlayUpdate()
}

function clearOverlayPointerValue() {
  if (!overlayCtx || overlayCtx.pointerValue == null) return
  overlayCtx.pointerValue = null
  requestOverlayUpdate()
}

function updateOverlayNow() {
  if (!overlayCtx || !chart) return
  const g = ensureOverlayGroup()
  if (!g) return

  const rect = getGridRectSafe()
  if (!rect) return

  const xMax = overlayCtx.xMax
  const instrumentText = overlayCtx.instrumentText

  g.removeAll()

  const bottom = rect.y + rect.height

  // 0) 大水印：贴 X 轴、左右贴边、不旋转、单个
  const size = computeWatermarkFontSize(instrumentText, rect)

  g.add(new echarts.graphic.Text({
    silent: true,
    style: {
      x: rect.x,           // ✅ 左边贴边
      y: bottom,           // ✅ 贴到 X 轴（绘图区底边）
      text: instrumentText,
      fill: 'rgba(255,255,255,0.075)',  // 非纯白、低饱和
      font: `italic bold ${Math.round(size)}px system-ui, sans-serif`,
      align: 'left',       // ✅ 从左开始排版，右侧自然到达 rect.x + rect.width
      verticalAlign: 'bottom'
    }
  }))

  // 1) 自定义 x 轴标签：500 / 3k（只画文字，不画竖线）
  const customTicks = [
    { x: 500, label: '500' },
    { x: 3000, label: '3k' }
  ].filter(t => t.x >= 20 && t.x <= xMax)

  const tickTextY = bottom + 10
  customTicks.forEach(t => {
    const px = chart.convertToPixel({ xAxisIndex: 0 }, t.x)
    g.add(new echarts.graphic.Text({
      silent: true,
      style: {
        x: px,
        y: tickTextY,
        text: t.label,
        fill: '#9a9a9a',
        fontSize: 11,
        align: 'center',
        verticalAlign: 'top'
      }
    }))
  })

  // 2) 频段条：所有页显示
  const bandY = bottom + 34
  const bandH = 16
  const bandTextY = bandY + 8

  const bands = FR_BANDS
    .map(b => ({ ...b, from: Math.max(20, b.from), to: Math.min(xMax, b.to) }))
    .filter(b => b.to > b.from)

  bands.forEach((b, idx) => {
    const x1 = chart.convertToPixel({ xAxisIndex: 0 }, b.from)
    const x2 = chart.convertToPixel({ xAxisIndex: 0 }, b.to)
    const w = Math.max(0, x2 - x1)
    const bg = idx % 2 === 0 ? 'rgba(255,255,255,0.035)' : 'rgba(255,255,255,0.02)'

    g.add(new echarts.graphic.Rect({
      silent: true,
      shape: { x: x1, y: bandY, width: w, height: bandH, r: 3 },
      style: { fill: bg }
    }))

    const centerHz = geometricCenter(b.from, b.to)
    const tx = chart.convertToPixel({ xAxisIndex: 0 }, centerHz)

    g.add(new echarts.graphic.Text({
      silent: true,
      style: {
        x: tx, y: bandTextY,
        text: b.name,
        fill: 'rgba(255,255,255,0.5)',
        fontSize: 10,
        align: 'center',
        verticalAlign: 'middle'
      }
    }))
  })

  if (overlayCtx.pointerValue != null) {
    const pointerY = chart.convertToPixel({ yAxisIndex: 0 }, overlayCtx.pointerValue)
    if (typeof pointerY === 'number' && isFinite(pointerY)) {
      const mode = overlayCtx.mode || 'fr'
      const unit = mode === 'thd' ? '%' : 'dB'
      const label = formatYValue(mode, overlayCtx.pointerValue) + unit
      const measureCtx = getMeasureCtx()
      measureCtx.font = '12px system-ui, sans-serif'

      const boxW = Math.ceil(measureCtx.measureText(label).width) + 14
      const boxH = 22
      const boxX = rect.x + 6
      const boxY = Math.max(rect.y + 4, Math.min(bottom - boxH - 4, pointerY - boxH / 2))

      g.add(new echarts.graphic.Rect({
        silent: true,
        shape: { x: boxX, y: boxY, width: boxW, height: boxH, r: 6 },
        style: {
          fill: '#111111',
          stroke: 'rgba(255,255,255,0.22)',
          lineWidth: 1
        }
      }))

      g.add(new echarts.graphic.Text({
        silent: true,
        style: {
          x: boxX + boxW / 2,
          y: boxY + boxH / 2,
          text: label,
          fill: '#f2f2f2',
          font: '12px system-ui, sans-serif',
          align: 'center',
          verticalAlign: 'middle'
        }
      }))
    }
  }

  chart.getZr().refresh()
}

/* ---------------- Y zoom interval dynamic ---------------- */
function requestUpdateDbIntervalFromZoom() {
  if (yZoomRAF) return
  yZoomRAF = requestAnimationFrame(() => {
    yZoomRAF = 0
    updateDbIntervalFromZoom()
  })
}

function updateDbIntervalFromZoom() {
  if (!chart || isTHDType()) return
  if (yFullMin == null || yFullMax == null) return

  const opt = chart.getOption()
  const dz = (opt.dataZoom && opt.dataZoom[0]) ? opt.dataZoom[0] : null
  if (!dz) return

  const start = (typeof dz.start === 'number') ? dz.start : 0
  const end   = (typeof dz.end === 'number') ? dz.end : 100

  const fullRange = (yFullMax - yFullMin)
  const vMin = yFullMin + fullRange * (start / 100)
  const vMax = yFullMin + fullRange * (end   / 100)
  const range = Math.abs(vMax - vMin)

  let interval = 10
  if (range <= 12) interval = 1
  else if (range <= 24) interval = 2
  else if (range <= 60) interval = 5
  else interval = 10

  chart.setOption({ yAxis: [{ interval }] })
}

/* ---------------- data building ---------------- */
function parsePointsFromRows(rows, xMax, yColIndex = 1, thdMode = false) {
  return (rows || []).slice(1).map(r => {
    const x = parseFloat(r[0])
    const y = parseFloat(r[yColIndex])
    if (isNaN(x) || isNaN(y)) return null
    if (x < 20 || x > xMax) return null
    if (thdMode && y <= 0) return null
    return [x, y]
  }).filter(Boolean)
}

function computeYRangeFromSeries(series) {
  let min = Infinity, max = -Infinity
  series.forEach(s => {
    if (!s || !s.data || !s.data.length) return
    if (s.name === GRID_SERIES_NAME) return
    if (isSeriesHiddenState(s)) return
    s.data.forEach(pt => {
      const y = pt[1]
      if (typeof y !== 'number' || isNaN(y)) return
      min = Math.min(min, y)
      max = Math.max(max, y)
    })
  })
  if (!isFinite(min) || !isFinite(max)) return { min: -10, max: 10 }
  return { min, max }
}

function buildDataSeries({ xMax }) {
  const list = []
  const thd = isTHDType()
  const noise = isNoiseType()
  const fr = isFRType()

  const singleProduct = products.length === 1
  let singleColorCursor = 0

  const satFactors = [0.72, 0.58, 0.48, 0.40, 0.34]

  const baseSeriesCommon = {
    symbol: 'none',
    animation: false,
    sampling: 'lttb',
    emphasis: { disabled: true },
    blur: { lineStyle: { opacity: 1 } },
    select: { disabled: true }
  }

  products.forEach((p) => {
    const curves = (p.data || []).filter(d => d && d.type && d.type.id === activeType)

    curves.forEach((curve, ci) => {
      const rows = (curve.data || [])
      if (rows.length < 2) return

      let lineType = 'solid'
      if (noise) lineType = getNoiseGroupFromTitle(curve.title || '') === 'overall' ? 'solid' : 'dashed'
      if (thd) lineType = 'solid'
      if (fr) lineType = 'solid'

      const pickColor = (subIdx) => {
        if (singleProduct) {
          const base = COLORS[(singleColorCursor++) % COLORS.length]
          return adjustSatLight(base, 0.70, -0.14)
        }
        const f = satFactors[subIdx % satFactors.length]
        return adjustSatLight(p.color, f, -0.14)
      }

      if (thd) {
        const header = rows[0] || []
        let colNames = (header || []).slice(1).map(s => String(s || '').replace(/^\s*\*\s*/g,'').replace(/\(\s*%\s*\)/gi,'').replace(/%/g,'').trim()).filter(Boolean)
        if (!colNames.length) colNames = ['THD']

        colNames.forEach((colName, colIdx) => {
          const points = parsePointsFromRows(rows, xMax, colIdx + 1, true)
          const c = pickColor(ci * 10 + colIdx)

          list.push({
            ...baseSeriesCommon,
            name: (p.title || 'Unknown') + ' · ' + (curve.title || '') + ' · ' + colName,
            type: 'line',
            data: points,
            z: 2,
            productUrl: p.url,
            productTitle: p.title || 'Unknown',
            curveTitle: curve.title || '',
            noiseGroup: null,
            lineStyle: { width: colIdx === 0 ? 1.8 : 1.4, type: 'solid', color: c },
            itemStyle: { color: c }
          })
        })
        return
      }

      const points = parsePointsFromRows(rows, xMax, 1, false)
      const c = pickColor(ci)

      list.push({
        ...baseSeriesCommon,
        name: (p.title || 'Unknown') + ' · ' + (curve.title || ''),
        type: 'line',
        data: points,
        z: 2,
        productUrl: p.url,
        productTitle: p.title || 'Unknown',
        curveTitle: curve.title || '',
        noiseGroup: noise ? getNoiseGroupFromTitle(curve.title || '') : null,
        lineStyle: { width: 1.7, type: lineType, color: c },
        itemStyle: { color: c }
      })
    })

    // Target：作为普通曲线（可关、tooltip 显示），并做 alignment_db/hz 对齐
    if (activeType === FR_TYPE_ID && p.target_data && p.target_data.length) {
      p.target_data.forEach(t => {
        let points = parsePointsFromRows(t.data || [], xMax, 1, false)

        const alignHz = Number(t.alignment_hz || 0)
        const alignDb = (typeof t.alignment_db === 'number') ? t.alignment_db : Number(t.alignment_db || 0)

        if (alignHz > 0 && isFinite(alignDb) && points.length) {
          const yAt = interpolateY(points, alignHz)
          if (yAt != null && isFinite(yAt)) {
            points = shiftY(points, alignDb - yAt)
          }
        }

        const c = '#ffffff'
        list.push({
          ...baseSeriesCommon,
          name: 'Target: ' + (t.name || ''),
          type: 'line',
          data: points,
          z: 1,
          productUrl: p.url,
          productTitle: p.title || 'Unknown',
          curveTitle: t.name || '',
          noiseGroup: null,
          lineStyle: { width: 1.9, type: 'dashed', color: c, opacity: 0.95 },
          itemStyle: { color: c }
        })
      })
    }
  })

  return list
}

function buildGridSeries({ gridXs, noise }) {
  const markLineData = (gridXs || []).map(x => ({
    xAxis: x,
    lineStyle: { color: 'rgba(255,255,255,0.07)', width: 1, type: 'solid', cap: 'butt' },
    label: { show: false }
  }))

  if (noise) {
    markLineData.push({
      yAxis: 0,
      lineStyle: { color: 'rgba(255,255,255,0.14)', width: 1, type: 'dashed', cap: 'butt' },
      label: { show: false }
    })
  }

  return {
    name: GRID_SERIES_NAME,
    type: 'line',
    data: [],
    symbol: 'none',
    silent: true,
    tooltip: { show: false },
    lineStyle: { opacity: 0 },
    z: 0,
    markLine: { silent: true, symbol: 'none', data: markLineData }
  }
}

/* ---------------- render ---------------- */
function renderChart() {
  if (!chart) return

  if (!products.length || !activeType) {
    lastRenderedSeries = []
    overlayCtx = null
    chart.clear()
    renderLegend([])
    renderTags()
    if (overlayGroup) overlayGroup.removeAll()
    return
  }

  const xMin = 20
  const xMax = getXAxisMax()

  const mode = isTHDType() ? 'thd' : (isNoiseType() ? 'noise' : 'fr')
  const noise = (mode === 'noise')
  const thd   = (mode === 'thd')

  const gridXs = thd ? [] : buildManualLogGridX(xMax)
  const dataSeries = buildDataSeries({ xMax })

  if (!dataSeries.length) {
    lastRenderedSeries = []
    overlayCtx = null
    chart.clear()
    renderLegend([])
    renderTags()
    if (overlayGroup) overlayGroup.removeAll()
    return
  }

  dataSeries.forEach(s => {
    if (isSeriesHiddenState(s)) {
      s.lineStyle = Object.assign({}, s.lineStyle, { opacity: 0 })
      s.itemStyle = Object.assign({}, s.itemStyle, { opacity: 0 })
    }
  })

  const gridSeries = buildGridSeries({ gridXs, noise })
  const fullSeries = [gridSeries].concat(dataSeries)
  lastRenderedSeries = fullSeries

  if (thd) {
    yFullMin = null
    yFullMax = null
  } else if (noise) {
    yFullMin = (parseInt(document.getElementById('yMin').value) || -100)
    yFullMax = (parseInt(document.getElementById('yMax').value) || 30)
  } else {
    const r = computeYRangeFromSeries(dataSeries)
    const pad = 6
    yFullMin = Math.floor((r.min - pad) / 5) * 5
    yFullMax = Math.ceil((r.max + pad) / 5) * 5
  }

  const yAxisName = thd ? '%' : 'SPL(dB)'

  const yAxisOpt = thd
    ? {
        type: 'log',
        logBase: 10,
        min: 0.001,
        max: 150,
        name: yAxisName,
        nameGap: 14,
        nameTextStyle: { color: '#9a9a9a', fontSize: 11 },
        axisLine: { lineStyle: { color: '#2a2a2a', width: 3 } },
        axisTick: { show: false },
        splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.06)', width: 1, cap: 'butt' } },
        minorTick: { show: false },
        minorSplitLine: { show: false },
        axisLabel: { color: '#9a9a9a', fontSize: 11 }
      }
    : {
        type: 'value',
        min: yFullMin,
        max: yFullMax,
        name: yAxisName,
        nameGap: 14,
        nameTextStyle: { color: '#9a9a9a', fontSize: 11 },
        axisLine: { lineStyle: { color: '#2a2a2a', width: 3 } },
        axisTick: { show: false },
        splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.05)', width: 1, cap: 'butt' } },
        axisLabel: { color: '#9a9a9a', fontSize: 11, margin: 10 },
        interval: 10
      }

  chart.setOption({
    backgroundColor: '#0f0f0f',
    animation: false,

    grid: { left: 78, right: 20, top: 34, bottom: 84 },

    xAxis: {
      type: 'log',
      logBase: 10,
      min: xMin,
      max: xMax,
      axisLine: { lineStyle: { color: '#2a2a2a' } },
      axisTick: { show: false },
      splitLine: { show: false },
      minorTick: { show: false },
      minorSplitLine: { show: false },
      axisLabel: {
        color: '#9a9a9a',
        fontSize: 11,
        margin: 10,
        showMinLabel: true,
        showMaxLabel: true,
        formatter: (v) => formatHzLabel(v, xMax)
      }
    },

    yAxis: yAxisOpt,

    tooltip: {
      trigger: 'axis',
      confine: true,
      backgroundColor: '#111',
      borderColor: '#2a2a2a',
      textStyle: { color: '#e0e0e0', fontSize: 11 },
      axisPointer: {
        type: 'cross',
        label: { show: false },
        lineStyle: { color: 'rgba(255,255,255,0.35)', width: 1, type: 'dashed' },
        crossStyle: { color: 'rgba(255,255,255,0.22)', width: 1, type: 'dashed' }
      },
      formatter: function(params) {
        const pts = params.filter(p => p.seriesName !== GRID_SERIES_NAME)
        if (!pts.length) return ''

        const freq = pts[0].data[0]
        const label = freq >= 1000 ? (freq / 1000).toFixed(2) + 'kHz' : freq.toFixed(0) + 'Hz'
        const unit = thd ? '%' : 'dB'

        const lines = pts
          .filter(p => {
            const series = getRenderedSeriesByName(p.seriesName)
            return series && !isSeriesHiddenState(series)
          })
          .map(p => {
            return '<span style="color:' + p.color + '">●</span> ' +
                   p.seriesName + ': <b>' + formatYValue(mode, p.data[1]) + '</b> ' + unit
          })

        return '<b>' + label + '</b><br>' + lines.join('<br>')
      }
    },

    legend: { show: false },

    dataZoom: thd ? [] : [
      {
        type: 'inside',
        yAxisIndex: 0,
        filterMode: 'none',
        zoomOnMouseWheel: true,
        moveOnMouseMove: true,
        moveOnMouseWheel: false
      }
    ],

    series: fullSeries
  }, true)

  renderLegend(fullSeries)
  renderTags()

  overlayCtx = { xMax, instrumentText: getInstrumentLabel(), mode, pointerValue: null }
  requestOverlayUpdate()
  requestUpdateDbIntervalFromZoom()

  requestAnimationFrame(() => {
    chart && chart.resize()
    requestOverlayUpdate()
    requestUpdateDbIntervalFromZoom()
  })
}

function renderLegend(series) {
  const wrap = document.getElementById('legendWrap')
  wrap.innerHTML = ''
  wrap.style.removeProperty('--legend-col-width')
  if (!series || !series.length) return

  const items = getLegendItems(series)
  if (!items.length) return

  const measureCanvas = document.createElement('canvas')
  const measureCtx = measureCanvas.getContext('2d')
  measureCtx.font = '11px system-ui, sans-serif'
  const longestNameWidth = items.reduce((max, item) => {
    return Math.max(max, measureCtx.measureText(item.name || '').width)
  }, 0)
  const availableWidth = Math.max(160, wrap.clientWidth - 40)
  const legendColumnWidth = Math.min(availableWidth, Math.max(140, Math.ceil(longestNameWidth + 48)))
  wrap.style.setProperty('--legend-col-width', legendColumnWidth + 'px')

  const allHidden = items.every(s => isSeriesHiddenState(s))
  const actions = document.createElement('div')
  actions.className = 'legend-actions'

  const btn = document.createElement('button')
  btn.className = 'btn-sm'
  btn.style.fontSize = '11px'
  btn.style.padding = '2px 8px'
  btn.textContent = allHidden ? t('showAll') : t('hideAll')
  btn.addEventListener('click', () => {
    if (allHidden) {
      hiddenSeries = new Set()
      resetNoiseViewState()
    } else {
      hiddenSeries = new Set(items.map(s => s.name))
      resetNoiseViewState()
    }
    renderChart()
  })
  actions.appendChild(btn)

  if (isNoiseType()) {
    ;[
      { key: 'overall', label: t('noiseOverall') },
      { key: 'active', label: t('noiseActive') },
      { key: 'passive', label: t('noisePassive') }
    ].forEach(filter => {
      if (!items.some(item => item.noiseGroup === filter.key)) return

      const quickBtn = document.createElement('button')
      quickBtn.className = 'btn-sm' + (noiseExclusiveGroup === filter.key ? ' active' : '')
      quickBtn.style.fontSize = '11px'
      quickBtn.style.padding = '2px 8px'
      quickBtn.textContent = filter.label
      quickBtn.addEventListener('click', () => {
        setExclusiveNoiseGroup(filter.key)
        renderChart()
      })
      actions.appendChild(quickBtn)
    })
  }

  wrap.appendChild(actions)

  items.forEach(s => {
    const hidden = isSeriesHiddenState(s)
    const styleType = (s.lineStyle && s.lineStyle.type) ? s.lineStyle.type : 'solid'
    const color = (s.lineStyle && s.lineStyle.color) ? s.lineStyle.color : '#fff'
    const border = '2px ' + styleType + ' ' + color

    const el = document.createElement('div')
    el.className = 'legend-item' + (hidden ? ' hidden' : '')

    const line = document.createElement('div')
    line.className = 'legend-line'
    line.style.borderTop = border

    const name = document.createElement('span')
    name.className = 'legend-name'
    name.textContent = s.name

    el.appendChild(line)
    el.appendChild(name)

    el.addEventListener('click', () => {
      enterCustomNoiseVisibility(items)
      if (hiddenSeries.has(s.name)) hiddenSeries.delete(s.name)
      else hiddenSeries.add(s.name)
      renderChart()
    })

    wrap.appendChild(el)
  })
}

function renderTags() {
  const el = document.getElementById('productTags')
  el.innerHTML = ''
  products.forEach(p => {
    const tag = document.createElement('div')
    tag.className = 'product-tag'
    tag.style.borderColor = p.color + '60'
    tag.style.color = p.color

    const dot = document.createElement('span')
    dot.className = 'dot'
    dot.style.background = p.color

    const body = document.createElement('div')
    body.className = 'product-tag-body'

    const title = document.createElement('span')
    title.className = 'title'
    title.textContent = p.title || '(unknown)'

    const remove = document.createElement('span')
    remove.className = 'remove'
    remove.textContent = '×'
    remove.title = t('remove')
    remove.addEventListener('click', () => removeProduct(p.url))

    body.appendChild(title)
    getProductSummaryRows(p).forEach(row => {
      const { primaryMetric, secondaryMetrics } = splitSummaryMetrics(row)
      const stats = document.createElement('div')
      stats.className = row.className

      if (primaryMetric) {
        const primary = document.createElement('div')
        primary.className = 'tag-stats-primary' + (row.chipClassName ? ' ' + row.chipClassName : '')

        const primaryTop = document.createElement('div')
        primaryTop.className = 'tag-stats-primary-top'

        const primaryTitle = document.createElement('span')
        primaryTitle.className = 'tag-stats-primary-title'
        primaryTitle.textContent = row.label

        const primaryHint = document.createElement('span')
        primaryHint.className = 'tag-stats-primary-hint'
        primaryHint.textContent = primaryMetric.label

        const primaryValue = document.createElement('span')
        primaryValue.className = 'tag-stats-primary-value'
        primaryValue.textContent = primaryMetric.value

        primaryTop.appendChild(primaryTitle)
        primaryTop.appendChild(primaryHint)
        primary.appendChild(primaryTop)
        primary.appendChild(primaryValue)
        stats.appendChild(primary)
      }

      const boxes = document.createElement('div')
      boxes.className = 'tag-stats-boxes'

      secondaryMetrics.forEach(metric => {
        const chip = document.createElement('span')
        chip.className = 'stat-chip' + (row.chipClassName ? ' ' + row.chipClassName : '')

        const chipLabel = document.createElement('span')
        chipLabel.className = 'stat-chip-label'
        chipLabel.textContent = metric.label

        const chipValue = document.createElement('span')
        chipValue.className = 'stat-chip-value'
        chipValue.textContent = metric.value

        chip.appendChild(chipLabel)
        chip.appendChild(chipValue)
        boxes.appendChild(chip)
      })

      if (secondaryMetrics.length) stats.appendChild(boxes)
      body.appendChild(stats)
    })

    tag.appendChild(dot)
    tag.appendChild(body)
    tag.appendChild(remove)
    el.appendChild(tag)
  })
}

function hideSearchResults() {
  const wrap = document.getElementById('searchResults')
  wrap && wrap.classList.remove('visible')
}

function renderSearchResults() {
  const wrap = document.getElementById('searchResults')
  const input = getProductInput()
  if (!wrap || !input) return

  const query = input.value.trim()
  wrap.innerHTML = ''

  const shouldShow = searchLoading || searchResults.length || (query.length >= 2 && lastSearchQuery === query)
  if (!shouldShow) {
    wrap.classList.remove('visible')
    return
  }

  wrap.classList.add('visible')

  if (searchLoading) {
    const loading = document.createElement('div')
    loading.className = 'search-result-empty'
    loading.textContent = t('searching')
    wrap.appendChild(loading)
    return
  }

  if (!searchResults.length) {
    const empty = document.createElement('div')
    empty.className = 'search-result-empty'
    empty.textContent = t('noResults')
    wrap.appendChild(empty)
    return
  }

  searchResults.forEach(item => {
    const added = products.some(p => p.url === item.url)
    const row = document.createElement('div')
    row.className = 'search-result' + (added ? ' added' : '')

    const title = document.createElement('div')
    title.className = 'search-result-title'
    title.textContent = item.title

    const meta = document.createElement('div')
    meta.className = 'search-result-meta'
    meta.textContent = added ? t('added') : t('clickAdd')

    row.appendChild(title)
    row.appendChild(meta)
    row.addEventListener('click', async () => {
      if (added) {
        setStatusKey('alreadyAdded', 'error')
        return
      }
      await addSearchResult(item)
    })

    wrap.appendChild(row)
  })
}

function clearSearchResults(options = {}) {
  if (!options.keepInput) {
    const input = getProductInput()
    if (input) input.value = ''
  }
  clearTimeout(searchTimer)
  searchRequestSeq += 1
  searchResults = []
  searchLoading = false
  lastSearchQuery = ''
  renderSearchResults()
}

async function performSearch(query) {
  const normalized = String(query || '').trim()
  if (normalized.length < 2) {
    clearSearchResults({ keepInput: true })
    return []
  }

  const reqId = ++searchRequestSeq
  searchLoading = true
  lastSearchQuery = normalized
  renderSearchResults()

  try {
    const res = await fetch('/api/search?q=' + encodeURIComponent(normalized))
    const json = await res.json()
    if (reqId !== searchRequestSeq) return []
    if (json.error) throw new Error(json.error)

    searchResults = json.results || []
    searchLoading = false
    renderSearchResults()
    return searchResults
  } catch (e) {
    if (reqId !== searchRequestSeq) return []
    searchResults = []
    searchLoading = false
    renderSearchResults()
    setStatus(e.message, 'error')
    return []
  }
}

function scheduleSearch() {
  clearTimeout(searchTimer)
  const query = getProductInputValue()
  if (normalizeProductUrl(query) || query.length < 2) {
    clearSearchResults({ keepInput: true })
    return
  }

  searchTimer = setTimeout(() => {
    performSearch(query)
  }, 220)
}

async function addSearchResult(item) {
  const added = await addProductFromUrl(item.url)
  if (added) clearSearchResults()
}

async function submitProductInput() {
  const value = getProductInputValue()
  if (!value) return

  const url = normalizeProductUrl(value)
  if (url) {
    await addProductFromUrl(url)
    return
  }

  if (value.length >= 2) {
    await performSearch(value)
  }
}

function handleProductInputPaste() {
  setTimeout(() => {
    const url = normalizeProductUrl(getProductInputValue())
    if (!url) return
    addProductFromUrl(url)
  }, 0)
}

async function searchAndAddTopResult() {
  return submitProductInput()
}

function renderTabs() {
  const types   = getAllTypes()
  const tabsEl  = document.getElementById('typeTabs')
  const noiseEl = document.getElementById('noiseRange')

  Array.from(tabsEl.children).forEach(c => {
    if (c.id !== 'noiseRange') c.remove()
  })

  if (!types.size) {
    noiseEl.classList.remove('visible')
    return
  }

  if (!activeType || !types.has(activeType)) {
    activeType = types.keys().next().value
  }

  const frag = document.createDocumentFragment()
  types.forEach((name, id) => {
    const btn = document.createElement('button')
    btn.className = 'type-tab' + (activeType === id ? ' active' : '')
    btn.textContent = name
    btn.addEventListener('click', () => {
      activeType = id
      hiddenSeries = new Set()
      resetNoiseViewState()
      renderTabs()
      renderChart()
      requestAnimationFrame(() => {
        chart && chart.resize()
        requestOverlayUpdate()
        requestUpdateDbIntervalFromZoom()
      })
    })
    frag.appendChild(btn)
  })
  tabsEl.insertBefore(frag, tabsEl.firstChild)

  noiseEl.classList.toggle('visible', isNoiseType())
}

function clearAll() {
  products = []
  activeType = null
  hiddenSeries = new Set()
  resetNoiseViewState()
  lastRenderedSeries = []
  renderTabs()
  renderTags()
  renderChart()
  setStatus('')
  hideSearchResults()
  if (overlayGroup) overlayGroup.removeAll()
}

function removeProduct(url) {
  products = products.filter(p => p.url !== url)
  if (!products.length) {
    resetNoiseViewState()
    lastRenderedSeries = []
  }
  renderTabs()
  renderTags()
  renderChart()
}

async function addProductFromUrl(url, options = {}) {
  const targetUrl = normalizeProductUrl(url)
  if (!targetUrl) {
    setStatusKey('invalidLink', 'error')
    return false
  }

  if (products.find(p => p.url === targetUrl)) {
    setStatusKey('alreadyAdded', 'error')
    return false
  }

  setStatusKey('loading', 'loading')
  try {
    const res = await fetch('/api/fetch?url=' + encodeURIComponent(targetUrl))
    const json = await res.json()
    if (json.error) throw new Error(json.error)

    json.url = targetUrl
    json.color = COLORS[products.length % COLORS.length]
    json.noiseStats = buildNoiseStatsMap(json)
    products.push(json)

    if (!options.keepInput) {
      setProductInputValue('')
    }
    setStatus('')
    renderTabs()
    renderTags()
    renderChart()
    return true
  } catch (e) {
    setStatus(e.message, 'error')
    return false
  }
}

async function addProduct() {
  return submitProductInput()
}

/* ---------------- init ---------------- */
window.addEventListener('load', function() {
  setViewportHeightVar()
  chart = echarts.init(document.getElementById('chart'))

  chart.on('datazoom', requestUpdateDbIntervalFromZoom)
  chart.on('updateAxisPointer', updateOverlayPointerValue)
  chart.getZr().on('globalout', clearOverlayPointerValue)

  window.addEventListener('resize', () => {
    setViewportHeightVar()
    chart.resize()
    requestOverlayUpdate()
  })

  document.getElementById('btnClear').addEventListener('click', clearAll)
  document.getElementById('btnExportMenu').addEventListener('click', () => {
    document.getElementById('exportMenu').classList.toggle('open')
  })
  document.querySelectorAll('[data-export-format]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('exportMenu').classList.remove('open')
      exportChartImage(btn.getAttribute('data-export-format'))
    })
  })
  document.getElementById('btnLang').addEventListener('click', toggleLanguage)
  document.getElementById('yMin').addEventListener('change', renderChart)
  document.getElementById('yMax').addEventListener('change', renderChart)

  const productInput = getProductInput()
  productInput.addEventListener('input', scheduleSearch)
  productInput.addEventListener('focus', renderSearchResults)
  productInput.addEventListener('paste', handleProductInputPaste)
  productInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      e.preventDefault()
      submitProductInput()
    } else if (e.key === 'Escape') {
      hideSearchResults()
    }
  })

  document.addEventListener('click', e => {
    const box = document.querySelector('.search-box')
    if (box && !box.contains(e.target)) hideSearchResults()
    const exportMenu = document.getElementById('exportMenu')
    if (exportMenu && !exportMenu.contains(e.target)) exportMenu.classList.remove('open')
  })

  applyLanguage()
  renderTabs()
  renderChart()

  requestAnimationFrame(() => {
    chart.resize()
    requestOverlayUpdate()
    setTimeout(() => {
      chart.resize()
      requestOverlayUpdate()
    }, 80)
  })
})
</script>
